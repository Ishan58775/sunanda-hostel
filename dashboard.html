<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Sunanda Girls Hostel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background-color: #0f172a; /* Premium Dark Navy */
            color: #f8fafc;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #1e293b;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #334155;
        }

        .brand {
            font-size: 20px;
            font-weight: 600;
            color: #d4af37; /* Gold */
            margin-bottom: 40px;
            text-align: center;
        }

        .nav-link {
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            color: #cbd5e1;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .nav-link i { margin-right: 15px; width: 20px; text-align: center; }
        .nav-link:hover, .nav-link.active { background: #d4af37; color: #0f172a; font-weight: 500; }
        
        .logout-btn { margin-top: auto; background: #ef4444; color: white; justify-content: center; font-weight: 600; }
        .logout-btn:hover { background: #dc2626; color: white; }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-weight: 500; font-size: 24px; }
        .user-info { display: flex; align-items: center; gap: 10px; color: #94a3b8; }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .stat-card h3 { color: #94a3b8; font-size: 14px; font-weight: 400; margin-bottom: 10px; }
        .stat-card .value { font-size: 28px; font-weight: 600; color: #d4af37; }

        /* Form Area */
        .card {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #334155;
            margin-bottom: 30px;
        }

        .card-title { margin-bottom: 20px; font-size: 18px; color: #f8fafc; border-bottom: 1px solid #334155; padding-bottom: 10px; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 13px; color: #cbd5e1; margin-bottom: 5px; }
        .form-group input, .form-group select {
            padding: 10px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: white;
            outline: none;
        }
        .form-group input:focus, .form-group select:focus { border-color: #d4af37; }

        .btn-gold {
            background: #d4af37;
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-gold:hover { box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }

        .btn-3d {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-3d:hover { background: #2563eb; }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">Sunanda Hostel</div>
        <a class="nav-link active"><i class="fas fa-home"></i> Dashboard</a>
        <a class="nav-link"><i class="fas fa-users"></i> All Students</a>
        <a class="nav-link"><i class="fas fa-money-bill-wave"></i> Fee Records</a>
        <a class="nav-link"><i class="fas fa-bed"></i> Room Allocation</a>
        <a class="nav-link"><i class="fas fa-exclamation-circle"></i> Complaints</a>
        <a class="nav-link logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Secure Logout</a>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Overview</h1>
            <div class="user-info">
                <i class="fas fa-user-shield"></i>
                <span id="adminEmail">Loading...</span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Students</h3>
                <div class="value">0</div>
            </div>
            <div class="stat-card">
                <h3>Available Beds</h3>
                <div class="value">45</div>
            </div>
            <div class="stat-card">
                <h3>Pending Fees</h3>
                <div class="value">₹0</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Register New Student</div>
            <form id="addStudentForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Student Full Name</label>
                        <input type="text" required placeholder="e.g. Priya Sharma">
                    </div>
                    <div class="form-group">
                        <label>Student Phone</label>
                        <input type="text" required placeholder="+91">
                    </div>
                    <div class="form-group">
                        <label>Aadhaar Number</label>
                        <input type="text" required placeholder="xxxx xxxx xxxx">
                    </div>
                    <div class="form-group">
                        <label>Total Yearly Fee Agreed (₹)</label>
                        <input type="number" required placeholder="e.g. 60000">
                    </div>
                    <div class="form-group">
                        <label>Assign Bed</label>
                        <button type="button" class="btn-3d"><i class="fas fa-cube"></i> Open 3D Bed Selector</button>
                    </div>
                    <div class="form-group">
                        <label>Upload Documents</label>
                        <input type="file" multiple disabled title="We will connect this to Google Drive next!">
                    </div>
                </div>
                <button type="submit" class="btn-gold">Save Student Record</button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAd_Tj_oH-VEzPMo3OUM0O8JEjG7lxdZGk",
            authDomain: "sunanda-hostel-app.firebaseapp.com",
            projectId: "sunanda-hostel-app",
            storageBucket: "sunanda-hostel-app.firebasestorage.app",
            messagingSenderId: "1034504045323",
            appId: "1:1034504045323:web:13376f6da4d4820c38d80e"
        };
        
        firebase.initializeApp(firebaseConfig);

        // --- SECURITY: CHECK IF LOGGED IN ---
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                // User is signed in. Show their email in the top right.
                document.getElementById('adminEmail').innerText = user.email;
            } else {
                // User is NOT signed in. Kick them back to login page.
                window.location.href = "index.html";
            }
        });

        // --- LOGOUT LOGIC ---
        document.getElementById('logoutBtn').addEventListener('click', () => {
            firebase.auth().signOut().then(() => {
                window.location.href = "index.html";
            });
        });
    </script>
</body>
</html>
