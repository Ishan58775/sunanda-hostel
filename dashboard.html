<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard | Sunanda Girls Hostel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background-color: #0f172a; 
            color: #f8fafc;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #1e293b;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #334155;
        }

        .brand { font-size: 20px; font-weight: 600; color: #d4af37; margin-bottom: 40px; text-align: center; }

        .nav-link {
            padding: 12px 15px; margin-bottom: 10px; border-radius: 8px; color: #cbd5e1;
            text-decoration: none; display: flex; align-items: center; transition: 0.3s; cursor: pointer;
        }
        .nav-link i { margin-right: 15px; width: 20px; text-align: center; }
        .nav-link:hover, .nav-link.active { background: #d4af37; color: #0f172a; font-weight: 500; }
        
        .logout-btn { margin-top: auto; background: #ef4444; color: white; justify-content: center; font-weight: 600; }
        .logout-btn:hover { background: #dc2626; color: white; }

        /* Main Content */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-weight: 500; font-size: 24px; }
        .user-info { display: flex; align-items: center; gap: 10px; color: #94a3b8; }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        .stat-card h3 { color: #94a3b8; font-size: 14px; font-weight: 400; margin-bottom: 10px; }
        .stat-card .value { font-size: 28px; font-weight: 600; color: #d4af37; }

        /* Table Area */
        .card { background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; }
        .card-title { margin-bottom: 20px; font-size: 18px; color: #f8fafc; border-bottom: 1px solid #334155; padding-bottom: 10px; }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 12px; border-bottom: 1px solid #334155; color: #94a3b8; font-size: 14px; font-weight: 500; }
        td { padding: 15px 12px; border-bottom: 1px solid #334155; font-size: 14px; }
        
        .status { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status.Pending { background: #fef08a; color: #854d0e; }
        .status.Approved { background: #bbf7d0; color: #166534; }

        .action-btn { background: transparent; color: #3b82f6; border: none; cursor: pointer; font-size: 14px; font-weight: 600; }
        .action-btn:hover { text-decoration: underline; }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">Sunanda Hostel</div>
        <a class="nav-link active"><i class="fas fa-home"></i> Dashboard</a>
        <a class="nav-link"><i class="fas fa-users"></i> All Students</a>
        <a class="nav-link"><i class="fas fa-money-bill-wave"></i> Fee Records</a>
        <a class="nav-link"><i class="fas fa-user-plus"></i> Add Admin</a>
        <a class="nav-link logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Secure Logout</a>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Owner Dashboard</h1>
            <div class="user-info">
                <i class="fas fa-user-shield"></i>
                <span id="adminEmail">Loading...</span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Applications</h3>
                <div class="value" id="totalStudents">0</div>
            </div>
            <div class="stat-card">
                <h3>Pending Approvals</h3>
                <div class="value" id="pendingApprovals">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Fees Collected</h3>
                <div class="value">₹0</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Recent Student Applications</div>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone Number</th>
                        <th>Room Preference</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    <tr><td colspan="5" style="text-align: center; color: #94a3b8;">Loading student data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // Your exact Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAd_Tj_oH-VEzPMo3OUM0O8JEjG7lxdZGk",
            authDomain: "sunanda-hostel-app.firebaseapp.com",
            projectId: "sunanda-hostel-app",
            storageBucket: "sunanda-hostel-app.firebasestorage.app",
            messagingSenderId: "1034504045323",
            appId: "1:1034504045323:web:13376f6da4d4820c38d80e"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- SECURITY: CHECK IF LOGGED IN ---
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('adminEmail').innerText = user.email || user.phoneNumber;
                loadStudentData(); // Fetch the students once logged in
            } else {
                window.location.href = "index.html"; // Kick out if not logged in
            }
        });

        // --- LOAD DATA FROM DATABASE ---
        function loadStudentData() {
            // Listen to the "students" database in real-time
            db.collection("students").onSnapshot((querySnapshot) => {
                const tableBody = document.getElementById('studentTableBody');
                tableBody.innerHTML = ""; // Clear loading text
                
                let total = 0;
                let pendingCount = 0;

                if (querySnapshot.empty) {
                    tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #94a3b8;">No applications yet. When students apply, they will appear here!</td></tr>';
                    document.getElementById('totalStudents').innerText = "0";
                    document.getElementById('pendingApprovals').innerText = "0";
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const student = doc.data();
                    total++;
                    if(student.status === "Pending") pendingCount++;

                    // Create a row for each student
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${student.name || "N/A"}</td>
                        <td>${student.phone || "N/A"}</td>
                        <td>${student.room_preference || "N/A"}</td>
                        <td><span class="status ${student.status || 'Pending'}">${student.status || 'Pending'}</span></td>
                        <td><button class="action-btn" onclick="alert('View Details coming soon!')">Review</button></td>
                    `;
                    tableBody.appendChild(tr);
                });

                // Update the Top Stats
                document.getElementById('totalStudents').innerText = total;
                document.getElementById('pendingApprovals').innerText = pendingCount;
            });
        }

        // --- LOGOUT LOGIC ---
        document.getElementById('logoutBtn').addEventListener('click', () => {
            firebase.auth().signOut().then(() => {
                window.location.href = "index.html";
            });
        });
    </script>
</body>
</html>
